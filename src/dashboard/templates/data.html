{% extends "base.html" %}
{% set active = "data" %}

{% block page_title %}Data Browser{% endblock %}

{% block content %}
<div class="card">
    <div class="controls-row">
        <select id="table-select" onchange="loadData()">
            <option value="trades_raw">trades_raw</option>
            <option value="book_tob">book_tob</option>
            <option value="book_levels">book_levels</option>
            <option value="mark_index">mark_index</option>
            <option value="funding">funding</option>
            <option value="open_interest">open_interest</option>
            <option value="liquidations">liquidations</option>
        </select>
        <select id="symbol-select" onchange="loadData()">
            <option value="">All Symbols</option>
            <option value="BTCUSDT">BTCUSDT</option>
            <option value="ETHUSDT">ETHUSDT</option>
            <option value="ADAUSDT">ADAUSDT</option>
        </select>
        <select id="limit-select" onchange="loadData()">
            <option value="50">50 rows</option>
            <option value="100" selected>100 rows</option>
            <option value="500">500 rows</option>
        </select>
        <button class="btn" onclick="loadData()">Refresh</button>
    </div>
</div>

<div class="card mt-1">
    <div id="data-count" class="muted"></div>
    <div id="data-table" class="table-scroll"></div>
</div>

<script>
async function loadData() {
    const table = document.getElementById('table-select').value;
    const symbol = document.getElementById('symbol-select').value;
    const limit = document.getElementById('limit-select').value;
    let url = `${ROOT_PATH}/api/data/${table}?limit=${limit}`;
    if (symbol) url += `&symbol=${symbol}`;

    const resp = await fetch(url);
    const data = await resp.json();

    document.getElementById('data-count').textContent = `Showing ${data.count} rows from ${data.table}`;

    const rows = data.rows || [];
    if (!rows.length) {
        document.getElementById('data-table').innerHTML = '<p class="muted">No data</p>';
        return;
    }

    const cols = Object.keys(rows[0]);
    let html = '<table class="data-table"><tr>';
    cols.forEach(c => { html += `<th>${c}</th>`; });
    html += '</tr>';
    rows.forEach(r => {
        html += '<tr>';
        cols.forEach(c => {
            let val = r[c];
            if (val === null) val = '<span class="muted">null</span>';
            else if (typeof val === 'object') val = JSON.stringify(val).substring(0, 60);
            else if (typeof val === 'string' && val.includes('T')) {
                try { val = new Date(val).toLocaleString(); } catch(e) {}
            }
            html += `<td>${val}</td>`;
        });
        html += '</tr>';
    });
    html += '</table>';
    document.getElementById('data-table').innerHTML = html;
}

loadData();
</script>
{% endblock %}
