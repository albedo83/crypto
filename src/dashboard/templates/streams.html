{% extends "base.html" %}
{% set active = "streams" %}

{% block page_title %}Stream Management{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h3>Active Streams</h3>
        <button class="btn btn-warning" onclick="restartWs()">Restart WebSocket</button>
    </div>
    <div id="streams-table"
         hx-get="{{ rp }}/api/streams" hx-trigger="load, every 3s"
         hx-target="#streams-data" hx-swap="innerHTML">
    </div>
    <div id="streams-data"></div>
</div>

<script>
document.body.addEventListener('htmx:afterRequest', function(evt) {
    if (evt.detail.pathInfo.requestPath.endsWith('/api/streams')) {
        try {
            const data = JSON.parse(evt.detail.xhr.responseText);
            renderStreams(data.streams || []);
        } catch(e) {}
    }
});

function renderStreams(streams) {
    const el = document.getElementById('streams-data');
    let html = `<table class="data-table">
        <tr><th>Symbol</th><th>Active</th><th>Collecting</th><th>Last Trade</th><th>Last Book</th><th>Msg Rate/min</th><th>Latency P50</th><th>Action</th></tr>`;
    streams.forEach(s => {
        html += `<tr>
            <td><strong>${s.symbol}</strong></td>
            <td><span class="${s.is_active ? 'status-ok' : 'status-err'}">${s.is_active ? 'Yes' : 'No'}</span></td>
            <td><span class="${s.is_collecting ? 'status-ok' : 'status-err'}">${s.is_collecting ? 'Yes' : 'No'}</span></td>
            <td>${s.last_trade_ts ? new Date(s.last_trade_ts).toLocaleTimeString() : '--'}</td>
            <td>${s.last_book_ts ? new Date(s.last_book_ts).toLocaleTimeString() : '--'}</td>
            <td>${s.msg_rate_1m ? s.msg_rate_1m.toFixed(0) : '--'}</td>
            <td>${s.latency_p50_ms ? s.latency_p50_ms.toFixed(1) + 'ms' : '--'}</td>
            <td><button class="btn btn-sm" onclick="toggleStream('${s.symbol}')">${s.is_active ? 'Stop' : 'Start'}</button></td>
        </tr>`;
    });
    html += '</table>';
    el.innerHTML = html;
}

async function toggleStream(symbol) {
    await fetch(`${ROOT_PATH}/api/streams/${symbol}/toggle`, {method: 'POST'});
}

async function restartWs() {
    if (confirm('Restart WebSocket connection?')) {
        await fetch(`${ROOT_PATH}/api/streams/restart-ws`, {method: 'POST'});
    }
}
</script>
{% endblock %}
