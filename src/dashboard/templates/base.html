<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Crypto Dashboard{% endblock %}</title>
    {% set rp = request.scope.get('root_path', '') %}
    <link rel="stylesheet" href="{{ rp }}/static/css/dashboard.css">
    <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
    <script>var ROOT_PATH = "{{ rp }}";</script>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="sidebar">
        <div class="logo">
            <h2>CRYPTO</h2>
            <span class="subtitle">Microstructure</span>
        </div>
        <ul class="nav-links">
            <li><a href="{{ rp }}/" class="{% if active == 'overview' %}active{% endif %}">Overview</a></li>
            <li><a href="{{ rp }}/streams" class="{% if active == 'streams' %}active{% endif %}">Streams</a></li>
            <li><a href="{{ rp }}/data" class="{% if active == 'data' %}active{% endif %}">Data</a></li>
            <li><a href="{{ rp }}/charts" class="{% if active == 'charts' %}active{% endif %}">Charts</a></li>
            <li><a href="{{ rp }}/alerts" class="{% if active == 'alerts' %}active{% endif %}">Alerts</a></li>
            <li><a href="{{ rp }}/paper" class="{% if active == 'paper' %}active{% endif %}">Paper Bot</a></li>
        </ul>
        <div class="nav-footer">
            <div id="ws-status" class="ws-indicator disconnected">WS: --</div>
        </div>
    </nav>
    <main class="content">
        <header class="topbar">
            <h1>{% block page_title %}Dashboard{% endblock %}</h1>
            <div class="topbar-right">
                <span id="clock"></span>
            </div>
        </header>
        <div class="page-content">
            {% block content %}{% endblock %}
        </div>
    </main>
    <script src="{{ rp }}/static/js/dashboard.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
